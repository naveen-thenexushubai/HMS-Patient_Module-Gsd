version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: hospital-postgres
    environment:
      POSTGRES_DB: hospital_db
      POSTGRES_USER: hospital_app
      POSTGRES_PASSWORD: dev_password_change_in_prod
      # Enable pgAudit
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.utf8"
    command:
      - postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-pgaudit.sql:/docker-entrypoint-initdb.d/init-pgaudit.sql
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospital_app -d hospital_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
