spring:
  datasource:
    url: jdbc:postgresql://localhost:5435/hospital_db
    username: hospital_app
    password: dev_password_change_in_prod
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
        type:
          preferred_json_dd_type: jsonb
          descriptor:
            sql: TRACE
        search:
          backend:
            type: lucene
            directory:
              root: ${java.io.tmpdir}/lucene-test/indexes
          automatic_indexing:
            synchronization:
              strategy: sync
  flyway:
    enabled: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.type: TRACE
    org.hibernate.orm.jdbc.bind: TRACE

jwt:
  secret: test_jwt_secret_64_chars_base64_encoded_value_for_development_only_xyz
  expiration: 3600000

encryption:
  key: MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=
