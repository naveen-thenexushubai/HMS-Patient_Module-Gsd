<svg viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Title -->
  <text x="400" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Get Shit Done: Spec-Driven Method
  </text>
  
  <!-- Step 1: Write Spec -->
  <rect x="250" y="80" width="300" height="80" rx="10" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="115" font-size="18" font-weight="bold" text-anchor="middle" fill="white">1. Write the Spec</text>
  <text x="400" y="140" font-size="14" text-anchor="middle" fill="white">Define what, why, and how</text>
  
  <!-- Arrow -->
  <line x1="400" y1="160" x2="400" y2="200" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2: Review & Align -->
  <rect x="250" y="200" width="300" height="80" rx="10" fill="#8b5cf6" stroke="#7c3aed" stroke-width="2"/>
  <text x="400" y="235" font-size="18" font-weight="bold" text-anchor="middle" fill="white">2. Review & Align</text>
  <text x="400" y="260" font-size="14" text-anchor="middle" fill="white">Get stakeholder buy-in</text>
  
  <!-- Decision Diamond -->
  <line x1="400" y1="280" x2="400" y2="320" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
  <polygon points="400,320 500,370 400,420 300,370" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="375" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Approved?</text>
  
  <!-- No - loop back -->
  <line x1="300" y1="370" x2="200" y2="370" stroke="#ef4444" stroke-width="3"/>
  <line x1="200" y1="370" x2="200" y2="120" stroke="#ef4444" stroke-width="3"/>
  <line x1="200" y1="120" x2="250" y2="120" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowhead-red)"/>
  <text x="140" y="250" font-size="14" font-weight="bold" fill="#ef4444">No</text>
  <text x="140" y="270" font-size="12" fill="#ef4444">Revise</text>
  
  <!-- Yes - continue -->
  <line x1="400" y1="420" x2="400" y2="460" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="430" y="445" font-size="14" font-weight="bold" fill="#10b981">Yes</text>
  
  <!-- Step 3: Build -->
  <rect x="250" y="460" width="300" height="80" rx="10" fill="#10b981" stroke="#059669" stroke-width="2"/>
  <text x="400" y="495" font-size="18" font-weight="bold" text-anchor="middle" fill="white">3. Build It</text>
  <text x="400" y="520" font-size="14" text-anchor="middle" fill="white">Execute according to spec</text>
  
  <!-- Arrow -->
  <line x1="400" y1="540" x2="400" y2="580" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4: Test -->
  <rect x="250" y="580" width="300" height="80" rx="10" fill="#ec4899" stroke="#db2777" stroke-width="2"/>
  <text x="400" y="615" font-size="18" font-weight="bold" text-anchor="middle" fill="white">4. Test Against Spec</text>
  <text x="400" y="640" font-size="14" text-anchor="middle" fill="white">Verify requirements met</text>
  
  <!-- Decision Diamond 2 -->
  <line x1="400" y1="660" x2="400" y2="700" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
  <polygon points="400,700 500,750 400,800 300,750" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="755" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Passes?</text>
  
  <!-- No - loop to build -->
  <line x1="500" y1="750" x2="600" y2="750" stroke="#ef4444" stroke-width="3"/>
  <line x1="600" y1="750" x2="600" y2="500" stroke="#ef4444" stroke-width="3"/>
  <line x1="600" y1="500" x2="550" y2="500" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowhead-red)"/>
  <text x="630" y="630" font-size="14" font-weight="bold" fill="#ef4444">No</text>
  <text x="630" y="650" font-size="12" fill="#ef4444">Fix</text>
  
  <!-- Yes - ship -->
  <line x1="400" y1="800" x2="400" y2="840" stroke="#374151" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="430" y="825" font-size="14" font-weight="bold" fill="#10b981">Yes</text>
  
  <!-- Step 5: Ship -->
  <rect x="250" y="840" width="300" height="60" rx="10" fill="#059669" stroke="#047857" stroke-width="3"/>
  <text x="400" y="870" font-size="20" font-weight="bold" text-anchor="middle" fill="white">🚀 SHIP IT!</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#374151"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ef4444"/>
    </marker>
  </defs>
  
  <!-- Key Benefits Box -->
  <rect x="50" y="80" width="180" height="140" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2"/>
  <text x="140" y="105" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">✨ Key Benefits</text>
  <text x="60" y="130" font-size="12" fill="#374151">• Clear expectations</text>
  <text x="60" y="150" font-size="12" fill="#374151">• Reduced rework</text>
  <text x="60" y="170" font-size="12" fill="#374151">• Better alignment</text>
  <text x="60" y="190" font-size="12" fill="#374151">• Faster delivery</text>
  <text x="60" y="210" font-size="12" fill="#374151">• Quality outcomes</text>
</svg>